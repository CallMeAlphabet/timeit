name: aur-publish

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.*'
      - '.*/**'

jobs:
  aur-publish:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install tools
        run: pacman -Sy --noconfirm base-devel git openssh

      - name: Set up SSH, clone, bump version, and push to AUR
        run: |
          set -e
          mkdir -p /tmp/ssh
          echo "$AUR_SSH_PRIVATE_KEY" > /tmp/ssh/aur_key
          chmod 600 /tmp/ssh/aur_key
          export GIT_SSH_COMMAND="ssh -i /tmp/ssh/aur_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          git clone ssh://aur@aur.archlinux.org/timeit.git /tmp/aur-repo

          echo "=== Diagnostic: checking clone result ==="
          ls -la /tmp/aur-repo
          echo "=== git status ==="
          git -C /tmp/aur-repo status
          echo "=== end diagnostic ==="

          cd /tmp/aur-repo

          NEW_VERSION=$GITHUB_RUN_NUMBER
          sed -i "s/^pkgver=.*/pkgver=$NEW_VERSION/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          useradd -m builduser
          chown -R builduser:builduser /tmp/aur-repo
          git config --global --add safe.directory /tmp/aur-repo
          su builduser -c "cd /tmp/aur-repo && makepkg --printsrcinfo > .SRCINFO"

          git config user.name "CallMeAlphabet"
          git config user.email "sigma.alphabet@proton.me"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to push"
          else
            git commit -m "Auto-bump to build $GITHUB_RUN_NUMBER"
            git push
          fi
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
